<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pin your location</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    @font-face {
      font-family: 'HusqvarnaGothic-Bold';
      src: url('HusqvarnaGothic-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    /* ── Design Tokens (SKILL.md) ─────────────────────────────── */
    :root {
      --foreground:         #3D3D3C;
      --primary:            #227730;
      --background:         #F4F4F3;
      --card:               #FFFFFF;
      --border:             rgba(0, 0, 0, 0.08);
      --primary-foreground: #FFFFFF;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      font-weight: 350;
      -webkit-font-smoothing: antialiased;
      background: #f4f4f3;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    /* ── Trigger button ─────────────────────────────────────── */
    .trigger-btn {
      background: var(--primary);
      color: var(--primary-foreground);
      border: none;
      padding: 12px 32px;
      border-radius: 32px;
      font-family: 'HusqvarnaGothic', sans-serif;
      font-size: 14px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: opacity .15s;
    }
    .trigger-btn:hover { opacity: 0.88; }

    /* ── Overlay ────────────────────────────────────────────── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: transparent;
      z-index: 200;
      align-items: center; justify-content: center;
      padding: 24px;
    }
    .overlay.active { display: flex; }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Modal ──────────────────────────────────────────────── */
    .modal {
      background: var(--card);
      border-radius: 32px;
      width: 343px;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      box-shadow: 0px 8px 48px rgba(0, 0, 0, 0.20);
      animation: modalIn .2s ease;
      display: flex; flex-direction: column;
    }

    /* ── Map overlay buttons (close, trash, zoom) ──────────── */
    .map-btn {
      position: absolute;
      width: 40px; height: 40px;
      background: var(--card);
      border: none; border-radius: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--foreground);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
      transition: opacity .12s;
      z-index: 600;
    }
    .map-btn:hover { opacity: 0.8; }
    .close-btn { top: 16px; right: 16px; background: rgba(0, 0, 0, 0.4); box-shadow: none; }
    .trash-btn { top: 16px; left: 16px; }
    .zoom-wrap {
      position: absolute; bottom: 16px; left: 16px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 600;
    }
    .zoom-wrap .map-btn { position: static; }

    /* Center pin — always stays in the middle of the map */
    .center-pin {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -100%);
      z-index: 500;
      pointer-events: none;
    }

    /* ── Map area ───────────────────────────────────────────── */
    .map-wrap {
      position: relative;
      width: 343px;
      height: 350px;
      flex-shrink: 0;
    }
    #map { width: 100%; height: 100%; }
    .leaflet-container { font-family: 'Roboto', sans-serif; }
    .leaflet-control-zoom        { display: none !important; }
    .leaflet-control-attribution { display: none !important; }

    /* Title pill centered over map */
    .map-title {
      position: absolute; top: 16px; left: 0; right: 0;
      display: flex; justify-content: center;
      z-index: 500; pointer-events: none;
    }
    .map-title-pill {
      background: var(--card);
      border-radius: 32px;
      padding: 8px 20px;
      font-family: 'HusqvarnaGothic', sans-serif;
      font-size: 14px; font-weight: 700;
      line-height: 20px; letter-spacing: 0.2px;
      color: var(--foreground);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.14);
    }

    /* ── Bottom panel ───────────────────────────────────────── */
    .bottom-panel {
      background: var(--card);
      padding: 20px 20px 24px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ── Pin view ───────────────────────────────────────────── */
    .pin-view { display: flex; flex-direction: column; gap: 12px; }
    .pin-view.hidden { display: none; }

    /* Address input row */
    .ac-wrap { position: relative; }
    .address-row {
      display: flex; align-items: center; gap: 8px;
      height: 52px;
      border: 1px solid #3D3D3C;
      border-radius: 16px;
      padding: 0 16px;
      background: #FFFFFF;
    }
    .address-row svg { flex-shrink: 0; color: var(--foreground); opacity: 0.4; }
    .address-input {
      flex: 1; border: none; background: transparent; outline: none;
      font-family: 'Roboto', sans-serif;
      font-size: 16px; font-weight: 350;
      line-height: 20px;
      color: var(--foreground);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .address-input::placeholder { color: rgba(61, 61, 60, 0.4); }

    /* Spinner */
    .spin {
      width: 14px; height: 14px; flex-shrink: 0;
      border: 2px solid rgba(0,0,0,0.12);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .55s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Autocomplete dropdown */
    .ac-drop {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10);
      z-index: 1000; display: none; overflow: hidden;
    }
    .ac-drop.open { display: block; }
    .ac-row {
      padding: 10px 16px;
      font-family: 'Roboto', sans-serif;
      font-size: 14px; font-weight: 350;
      line-height: 20px;
      color: var(--foreground);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-start;
    }
    .ac-row:last-child { border-bottom: none; }
    .ac-row:hover { background: var(--background); }

    /* Instruction text */
    .instruction {
      font-family: 'Roboto', sans-serif;
      font-size: 16px; font-weight: 350;
      line-height: 20px;
      color: #3D3D3C;
    }

    .pin-heading {
      font-family: 'HusqvarnaGothic-Bold', sans-serif;
      font-size: 24px; font-weight: 700;
      color: #3D3D3C;
      margin-bottom: 16px;
    }

    /* Confirm button */
    .confirm-btn {
      width: 100%; height: 48px;
      background: #273A60;
      color: #FFFFFF;
      border: none; border-radius: 16px;
      font-family: 'HusqvarnaGothic-Bold', sans-serif;
      font-size: 14px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: opacity .15s;
      margin-top: 16px;
    }
    .confirm-btn:hover { opacity: 0.88; }
    .confirm-btn.outline {
      background: #FFFFFF;
      color: #273A60;
      border: 1.5px solid #273A60;
    }

    /* ── Result view ────────────────────────────────────────── */
    .result-view { display: none; flex-direction: column; gap: 12px; }
    .result-view.active { display: flex; }

    /* CORRECT badge */
    .correct-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--primary);
      border-radius: 8px 8px 8px 0;
      padding: 6px 12px 6px 6px;
      width: fit-content;
    }
    .check-circle {
      width: 20px; height: 20px;
      background: #FFFFFF;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .correct-label {
      font-family: 'HusqvarnaGothic-Bold', sans-serif;
      font-size: 12px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: #FFFFFF;
      line-height: 16px;
    }

    /* Result address */
    .result-address {
      font-family: 'Roboto', sans-serif;
      font-size: 14px; font-weight: 350;
      line-height: 20px;
      color: var(--foreground);
    }

    /* Result message */
    .result-msg {
      font-family: 'Roboto', sans-serif;
      font-size: 16px; font-weight: 350;
      line-height: 20px;
      color: #3D3D3C;
    }

    /* Learn more link */
    .learn-link {
      font-family: 'Roboto', sans-serif;
      font-size: 14px; font-weight: 350;
      line-height: 20px;
      color: var(--foreground);
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
    }
    .learn-link:hover { opacity: 0.72; }
  </style>
</head>
<body>

<div class="overlay active" id="overlay">
  <div class="modal">

    <!-- Map -->
    <div class="map-wrap">

      <div id="map"></div>

      <!-- Center pin (always stays in the middle of the screen) -->
      <div class="center-pin">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="42" viewBox="0 0 30 42">
          <filter id="shadow" x="-40%" y="-20%" width="180%" height="160%">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.35)"/>
          </filter>
          <path filter="url(#shadow)" d="M15 0C7.27 0 1 6.27 1 14c0 9.92 14 28 14 28S29 23.92 29 14C29 6.27 22.73 0 15 0z" fill="#E02020"/>
          <circle cx="15" cy="14" r="5.5" fill="white" opacity="0.95"/>
        </svg>
      </div>

      <!-- Trash button top-left -->

      <!-- Close button top-right -->
      <button class="map-btn close-btn" onclick="closeModal()" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0.924056 0.923504C1.18155 0.666015 1.58672 0.646209 1.86693 0.864083L1.93422 0.923504L19.0774 18.0664C19.3563 18.3453 19.3563 18.7976 19.0774 19.0765C18.8199 19.334 18.4147 19.3538 18.1345 19.1359L18.0672 19.0765L0.924056 1.93366C0.645106 1.65471 0.645106 1.20245 0.924056 0.923504Z" fill="white"/>
          <path d="M19.0759 0.923504C18.8185 0.666015 18.4133 0.646209 18.1331 0.864083L18.0658 0.923504L0.922648 18.0664C0.643698 18.3453 0.643698 18.7976 0.922648 19.0765C1.18014 19.334 1.58531 19.3538 1.86553 19.1359L1.93282 19.0765L19.0759 1.93366C19.3549 1.65471 19.3549 1.20245 19.0759 0.923504Z" fill="white"/>
        </svg>
      </button>

      <!-- Zoom buttons bottom-left -->
      <div class="zoom-wrap">
        <button class="map-btn" onclick="map.zoomIn()" aria-label="Zoom in">
          <svg width="17" height="17" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8.33332 0C8.63858 0 8.89018 0.229794 8.92456 0.525829L8.92856 0.595238V7.7381H16.0714C16.4001 7.7381 16.6666 8.00459 16.6666 8.33333C16.6666 8.63859 16.4369 8.89019 16.1408 8.92457L16.0714 8.92857H8.92856V16.0714C8.92856 16.4002 8.66206 16.6667 8.33332 16.6667C8.02806 16.6667 7.77647 16.4369 7.74208 16.1409L7.73809 16.0714V8.92857H0.595237C0.266497 8.92857 0 8.66207 0 8.33333C0 8.02807 0.229775 7.77649 0.52581 7.74211L0.595237 7.7381H7.73809V0.595238C7.73809 0.266497 8.00458 0 8.33332 0Z" fill="#3D3D3C"/>
          </svg>
        </button>
        <button class="map-btn" onclick="map.zoomOut()" aria-label="Zoom out">
          <svg width="17" height="17" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 8.33328C0 8.02802 0.229786 7.77643 0.52582 7.74204L0.595237 7.73804H16.0714C16.4001 7.73804 16.6666 8.00453 16.6666 8.33328C16.6666 8.63853 16.4369 8.89012 16.1408 8.92451L16.0714 8.92851H0.595237C0.266497 8.92851 0 8.66202 0 8.33328Z" fill="#3D3D3C"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Bottom panel -->
    <div class="bottom-panel">

      <!-- PIN VIEW -->
      <div class="pin-view" id="pinView">
        <h1 class="pin-heading">Pin your location on the map</h1>
        <div class="ac-wrap">
          <div class="address-row">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M14.0092 13.0069L14.0765 13.0664L19.7908 18.7806C20.0697 19.0596 20.0697 19.5118 19.7908 19.7908C19.5333 20.0483 19.1281 20.0681 18.8479 19.8502L18.7806 19.7908L13.0663 14.0765C12.7874 13.7976 12.7874 13.3453 13.0663 13.0664C13.3238 12.8089 13.729 12.7891 14.0092 13.0069ZM6.78571 0C10.5334 0 13.5714 3.03807 13.5714 6.78571C13.5714 10.5334 10.5334 13.5714 6.78571 13.5714C3.03807 13.5714 0 10.5334 0 6.78571C0 3.03807 3.03807 0 6.78571 0ZM6.78571 1.42857C3.82704 1.42857 1.42857 3.82704 1.42857 6.78571C1.42857 9.74438 3.82704 12.1428 6.78571 12.1428C9.74438 12.1428 12.1428 9.74438 12.1428 6.78571C12.1428 3.82704 9.74438 1.42857 6.78571 1.42857Z" fill="#3D3D3C"/>
            </svg>
            <input class="address-input" id="addrInput" type="text" placeholder="Search address…" autocomplete="off" />
            <div class="spin" id="sSpin"></div>
          </div>
          <div class="ac-drop" id="acDrop"></div>
        </div>
        <p class="instruction">Drag the map with two fingers to place the pin on your mower's operating area.</p>
        <button class="confirm-btn" onclick="handleConfirm()">CONFIRM</button>
      </div>

      <!-- RESULT VIEW -->
      <div class="result-view" id="resultView">
        <h1 class="pin-heading">Pin your location on the map</h1>
        <div class="ac-wrap">
          <div class="address-row">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M14.0092 13.0069L14.0765 13.0664L19.7908 18.7806C20.0697 19.0596 20.0697 19.5118 19.7908 19.7908C19.5333 20.0483 19.1281 20.0681 18.8479 19.8502L18.7806 19.7908L13.0663 14.0765C12.7874 13.7976 12.7874 13.3453 13.0663 13.0664C13.3238 12.8089 13.729 12.7891 14.0092 13.0069ZM6.78571 0C10.5334 0 13.5714 3.03807 13.5714 6.78571C13.5714 10.5334 10.5334 13.5714 6.78571 13.5714C3.03807 13.5714 0 10.5334 0 6.78571C0 3.03807 3.03807 0 6.78571 0ZM6.78571 1.42857C3.82704 1.42857 1.42857 3.82704 1.42857 6.78571C1.42857 9.74438 3.82704 12.1428 6.78571 12.1428C9.74438 12.1428 12.1428 9.74438 12.1428 6.78571C12.1428 3.82704 9.74438 1.42857 6.78571 1.42857Z" fill="#3D3D3C"/>
            </svg>
            <p class="address-input" id="resultAddr"></p>
          </div>
        </div>
        <div class="correct-badge">
          <span class="correct-label">Covered</span>
        </div>
        <p class="result-msg">Great news – you can use Husqvarna Cloud for a faster and seamless installation, as long as you have a stable internet connection at your property.</p>
        <button class="confirm-btn outline" onclick="closeModal()">GO BACK TO THE PRODUCT PAGE</button>
      </div>

    </div>
  </div>
</div>

<script>
// ── Map ───────────────────────────────────────────────────────
const map = L.map('map', { center: [55.6, 14.1], zoom: 15, zoomControl: false });
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 21 }).addTo(map);

let currentAddress = '';
let geocodeTimer = null;

// When the map stops moving, reverse-geocode the center
map.on('moveend', () => {
  const ll = map.getCenter();
  reverseGeocode(ll.lat, ll.lng);
  // If result view is showing, go back to pin view
  const resultView = document.getElementById('resultView');
  if (resultView.classList.contains('active')) {
    resultView.classList.remove('active');
    document.getElementById('pinView').classList.remove('hidden');
  }
});

function reverseGeocode(lat, lng) {
  document.getElementById('sSpin').style.display = 'block';
  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`, {
    headers: { 'Accept-Language': 'en' }
  })
  .then(r => r.json())
  .then(d => {
    document.getElementById('sSpin').style.display = 'none';
    const addr = d.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    currentAddress = addr;
    document.getElementById('addrInput').value = addr;
  })
  .catch(() => { document.getElementById('sSpin').style.display = 'none'; });
}

// ── Address search ────────────────────────────────────────────
const field = document.getElementById('addrInput');

field.addEventListener('input', function () {
  clearTimeout(geocodeTimer);
  const q = this.value.trim();
  if (q.length < 3) { closeAC(); return; }
  geocodeTimer = setTimeout(() => doSearch(q), 360);
});
field.addEventListener('keydown', e => { if (e.key === 'Escape') closeAC(); });
document.addEventListener('click', e => { if (!e.target.closest('.ac-wrap')) closeAC(); });

function doSearch(q) {
  document.getElementById('sSpin').style.display = 'block';
  fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(q) + '&format=json&limit=5',
    { headers: { 'Accept-Language': 'en' } })
  .then(r => r.json())
  .then(d => { document.getElementById('sSpin').style.display = 'none'; showAC(d); })
  .catch(() => { document.getElementById('sSpin').style.display = 'none'; });
}

function showAC(results) {
  const drop = document.getElementById('acDrop');
  drop.innerHTML = '';
  if (!results.length) { closeAC(); return; }
  results.forEach(r => {
    const el = document.createElement('div');
    el.className = 'ac-row';
    el.innerHTML = `<svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="flex-shrink:0;margin-top:2px;opacity:0.4"><path d="M7 1C4.8 1 3 2.8 3 5c0 3.2 4 8 4 8s4-4.8 4-8c0-2.2-1.8-4-4-4z"/><circle cx="7" cy="5" r="1.5" fill="currentColor" stroke="none"/></svg><span>${r.display_name}</span>`;
    el.addEventListener('click', () => pickResult(r));
    drop.appendChild(el);
  });
  drop.classList.add('open');
}

function closeAC() { document.getElementById('acDrop').classList.remove('open'); }

function pickResult(r) {
  currentAddress = r.display_name;
  field.value = r.display_name;
  closeAC();
  map.setView([+r.lat, +r.lon], 17);
}

// ── Clear pin ────────────────────────────────────────────────
function clearPin() {
  const center = map.getCenter();
  reverseGeocode(center.lat, center.lng);
}

// ── Confirm ───────────────────────────────────────────────────
function handleConfirm() {
  document.getElementById('resultAddr').textContent = currentAddress || field.value;
  document.getElementById('pinView').classList.add('hidden');
  document.getElementById('resultView').classList.add('active');
}

// ── Modal ─────────────────────────────────────────────────────
function openModal() {
  document.getElementById('overlay').classList.add('active');
  document.getElementById('pinView').classList.remove('hidden');
  document.getElementById('resultView').classList.remove('active');
  setTimeout(() => map.invalidateSize(), 60);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('active');
}

// ── Default address on load ───────────────────────────────────
const DEFAULT_ADDRESS = 'Lilla Frö 101, Mörbylånga, Sweden';
field.value = DEFAULT_ADDRESS;
fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(DEFAULT_ADDRESS) + '&format=json&limit=1',
  { headers: { 'Accept-Language': 'en' } })
.then(r => r.json())
.then(d => {
  if (d.length) {
    const r = d[0];
    currentAddress = r.display_name;
    field.value = DEFAULT_ADDRESS;
    const lat = +r.lat, lng = +r.lon;
    map.setView([lat, lng], 17);
  }
})
.catch(() => {});

</script>
</body>
</html>
